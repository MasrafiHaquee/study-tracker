<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="../css/home.css">
    <link rel="shortcut icon" href="../icons/logo.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/e4bb9feda2.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- sidebar start -->
        <div class="sidebar">
            <!-- dashboard start -->
            <div class="sidebarbuttons now">
                <i class="fa-solid fa-layer-group"></i>
                <h2>Dashboard</h2>
            </div>
            <!-- dashboard end -->

            <!-- to do list start-->
            <div class="sidebarbuttons todolist">
                 <i class="fa-solid fa-list-check"></i>
            <h2>To do List</h2>
            </div> 
            <!-- to do list end -->

            <!-- timmer start -->
            <div class="sidebarbuttons">
                 <i class="fa-regular fa-clock"></i>
                <h2>Pomodora</h2>
            </div>          
             <!-- timmer end -->

            <!-- setting start -->
            <div class="sidebarbuttons">
                 <i class="fa-solid fa-sliders"></i>
                <h2>Setting</h2>
            </div>              
             <!-- setting end -->

        </div>
        <!-- sidebar end -->

        <!-- header start -->
        <div class="header">
            <img src="../icons/logo.png" alt="">
            <h1>Study Tracker</h1>
        </div>
        <!-- header end -->

        <!-- body start -->
        <div class="body">
            <h1>Dashboard</h1>
            <p>Track your progress and compete</p>

            <div class="status">
             <!-- todays section start -->
             <div class="today">
                <i class="fa-solid fa-bolt"></i>
                <div class="times">
                    <p>Today's Study</p>
                    <h3>0h 0m</h3>
                </div>
             </div>
            <!-- todays section end -->

            <!-- to do list section start -->
            <div class="todolist-view">
                <i class="fa-solid fa-bars-progress"></i>
                <div class="persent">
                    <p>Task Complete</p>
                    <h3>0%</h3>
                </div>
             </div>
            <!-- to do list section start  -->
        </div>

        </div>
        <!-- body end -->
    </div>
    <script src="../js/home.js"></script>
</body>
</html>
