<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="../css/setting.css">
    <link rel="shortcut icon" href="../icons/logo.png" type="image/x-icon">
    <script src="https://kit.fontawesome.com/e4bb9feda2.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <!-- sidebar start -->
        <div class="sidebar">
            <!-- dashboard start -->
            <div class="sidebarbuttons dashboard">
                <i class="fa-solid fa-layer-group"></i>
                <h2>Dashboard</h2>
            </div>
            <!-- dashboard end -->

            <!-- to do list start-->
            <div class="sidebarbuttons todolist">
                 <i class="fa-solid fa-list-check"></i>
            <h2>To do List</h2>
            </div> 
            <!-- to do list end -->

            <!-- timmer start -->
            <div class="sidebarbuttons pomodora">
                 <i class="fa-regular fa-clock"></i>
                <h2>Pomodora</h2>
            </div>          
             <!-- timmer end -->

            <!-- setting start -->
            <div class="sidebarbuttons setting now">
                 <i class="fa-solid fa-sliders"></i>
                <h2>Setting</h2>
            </div>              
             <!-- setting end -->

        </div>
        <!-- sidebar end -->

        <!-- header start -->
        <div class="header">
            <img src="../icons/logo.png" alt="">
            <h1>Study Tracker</h1>
        </div>
        <!-- header end -->

        <!-- body start -->
        <div class="body">

        </div>
        <!-- body end -->
    </div>
    <script src="../js/setting.js"></script>
</body>
</html>
