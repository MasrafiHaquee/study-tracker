<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-left">
            <div class="brand-section">
                <div class="logo-wrapper">
                    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path d="M50 30L70 42V62L50 74L30 62V42L50 30Z" fill="currentColor"/>
                        <circle cx="50" cy="52" r="8" fill="var(--bg-primary)"/>
                    </svg>
                    <h1 class="brand-name">STUDY<span>TRACK</span></h1>
                </div>
                <p class="brand-tagline">Level up your learning journey</p>
            </div>
            
            <div class="features-grid">
                <div class="feature-item">
                    <span class="feature-icon">⚡</span>
                    <span class="feature-text">Real-time tracking</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🏆</span>
                    <span class="feature-text">Competitive leaderboard</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📊</span>
                    <span class="feature-text">Visual analytics</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🎯</span>
                    <span class="feature-text">Goal achievement</span>
                </div>
            </div>
        </div>
        
        <div class="login-right">
            <div class="login-box">
                <h2 class="login-title">Welcome Back</h2>
                <p class="login-subtitle">Sign in to continue your learning streak</p>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primary btn-login">
                        <span class="btn-text">Sign In</span>
                        <span class="btn-loader"></span>
                    </button>
                    
                    <div id="errorMessage" class="error-message"></div>
                </form>
                
                <div class="login-footer">
                    <p class="demo-credentials">
                        <strong>Demo:</strong> admin@study.com / admin123
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
