<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer - Study Tracker</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/timer.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M50 10L85 30V70L50 90L15 70V30L50 10Z" stroke="currentColor" stroke-width="4" fill="none"/>
                        <path d="M50 30L70 42V62L50 74L30 62V42L50 30Z" fill="currentColor"/>
                        <circle cx="50" cy="52" r="8" fill="var(--bg-primary)"/>
                    </svg>
                    <span class="logo-text">STUDY<span>TRACK</span></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon">📊</span><span class="nav-text">Dashboard</span></a>
                <a href="tasks.html" class="nav-item"><span class="nav-icon">✓</span><span class="nav-text">Tasks</span></a>
                <a href="timer.html" class="nav-item active"><span class="nav-icon">⏱</span><span class="nav-text">Timer</span></a>
                <a href="leaderboard.html" class="nav-item"><span class="nav-icon">🏆</span><span class="nav-text">Leaderboard</span></a>
                <a href="quiz.html" class="nav-item"><span class="nav-icon">🧠</span><span class="nav-text">Quiz</span></a>
                <a href="doubts.html" class="nav-item"><span class="nav-icon">❓</span><span class="nav-text">Doubts</span></a>
                <a href="bots.html" class="nav-item admin-only"><span class="nav-icon">🤖</span><span class="nav-text">Manage Bots</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="theme-toggle" id="themeToggle"><span class="theme-icon">🌙</span></div>
                <button class="btn-logout" id="logoutBtn"><span>Logout</span></button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <div class="user-info">
                    <span class="user-name" id="userName">Loading...</span>
                    <div class="user-avatar" id="userAvatar">A</div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">Study Timer</h1>
                    <p class="page-subtitle">Track your study sessions</p>
                </div>

                <div class="timer-section">
                    <div class="timer-card">
                        <div class="timer-display" id="timerDisplay">00:00:00</div>
                        <div class="subject-select">
                            <input type="text" id="subjectInput" placeholder="Subject (e.g., Math, Physics)" />
                        </div>
                        <div class="timer-controls">
                            <button class="btn-timer btn-start" id="btnStart">▶ Start</button>
                            <button class="btn-timer btn-pause hidden" id="btnPause">⏸ Pause</button>
                            <button class="btn-timer btn-stop" id="btnStop" disabled>⏹ Stop</button>
                        </div>
                        <div class="timer-stats" id="timerStats"></div>
                    </div>
                </div>

                <div class="sessions-history">
                    <h3 class="section-title">Recent Sessions</h3>
                    <div id="sessionsContainer" class="sessions-list"></div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../js/firebase-config.js"></script>
    <script type="module" src="../js/timer.js"></script>
</body>
</html>
